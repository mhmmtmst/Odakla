<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa bulunamadı · Ders Takip</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2308090A'/%3E%3Ccircle cx='32' cy='34' r='16' fill='none' stroke='%23FFE500' stroke-width='4'/%3E%3Cline x1='32' y1='34' x2='32' y2='23' stroke='%23FFE500' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='32' y1='34' x2='39' y2='38' stroke='%23FFE500' stroke-width='3' stroke-linecap='round'/%3E%3Crect x='27' y='13' width='10' height='5' rx='2' fill='%23FFE500'/%3E%3C/svg%3E">
<style>
  :root{
    --bg: #08090A; --surface: #131414; --border: #2B2C2A;
    --text-primary: #F5F4EC; --text-secondary: #A6A69B; --study: #FFE500;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    --font-mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text-primary);
    font-family:var(--font-sans); display:flex; align-items:center; justify-content:center;
    padding:24px; text-align:center;
  }
  .code{
    font-family:var(--font-mono); font-size:96px; font-weight:700; color:var(--study);
    text-shadow:0 0 24px rgba(255,229,0,0.35); line-height:1; margin:0 0 12px;
  }
  h1{ font-size:20px; margin:0 0 10px; }
  p{ color:var(--text-secondary); font-size:14px; margin:0 0 28px; }
  a.btn{
    display:inline-block; background:var(--study); color:#100F08; font-weight:600;
    text-decoration:none; padding:11px 22px; border-radius:8px; font-size:14px;
  }
  .prompt{ font-family:var(--font-mono); font-size:13px; color:var(--text-secondary); margin-bottom:18px; }
</style>
</head>
<body>
  <div>
    <div class="prompt">~/ders-takip $ bulunamadı</div>
    <p class="code">404</p>
    <h1>Bu sayfa yok gibi görünüyor</h1>
    <p>Aradığın bağlantı taşınmış ya da hiç var olmamış olabilir.</p>
    <a class="btn" href="/Ders-Takip/">Ana sayfaya dön</a>
  </div>
</body>
</html>
